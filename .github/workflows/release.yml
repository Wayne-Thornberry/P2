name: Release

on:
  push:
    branches: [main]

# Skip if triggered by the version-bump commit this workflow creates
concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    name: Version, Changelog & Publish
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip ci]')"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Type check
        run: npm run typecheck

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # ── Determine bump type from Conventional Commit prefixes ──────────────
      - name: Get previous tag
        id: prev_tag
        run: |
          PREV=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          echo "tag=$PREV" >> "$GITHUB_OUTPUT"

      - name: Determine version bump
        id: bump
        run: |
          if [ -n "${{ steps.prev_tag.outputs.tag }}" ]; then
            COMMITS=$(git log --pretty=format:"%s" "${{ steps.prev_tag.outputs.tag }}..HEAD")
          else
            COMMITS=$(git log --pretty=format:"%s")
          fi
          if echo "$COMMITS" | grep -qiE "BREAKING[[:space:]]CHANGE|^[a-z]+(\([^)]+\))?!:"; then
            echo "type=major" >> "$GITHUB_OUTPUT"
          elif echo "$COMMITS" | grep -qiE "^feat(\([^)]+\))?:"; then
            echo "type=minor" >> "$GITHUB_OUTPUT"
          else
            echo "type=patch" >> "$GITHUB_OUTPUT"
          fi

      # ── Bump version in package.json (no git tag yet) ──────────────────────
      - name: Bump package.json version
        id: version
        run: |
          npm version ${{ steps.bump.outputs.type }} --no-git-tag-version
          NEW=$(node -p "require('./package.json').version")
          echo "new=$NEW" >> "$GITHUB_OUTPUT"

      # ── Update CHANGELOG.md + generate release body ────────────────────────
      - name: Update CHANGELOG
        env:
          REPO: ${{ github.repository }}
          PREV_TAG: ${{ steps.prev_tag.outputs.tag }}
          NEW_VERSION: ${{ steps.version.outputs.new }}
        run: node .github/scripts/update-changelog.js

      # ── Commit, tag, push ──────────────────────────────────────────────────
      - name: Commit and tag
        run: |
          git add package.json CHANGELOG.md
          git commit -m "chore: release v${{ steps.version.outputs.new }} [skip ci]"
          git tag "v${{ steps.version.outputs.new }}"
          git push origin main --follow-tags

      # ── Build ──────────────────────────────────────────────────────────────
      - name: Build
        run: npm run build

      - name: Zip dist
        run: |
          cd dist
          zip -r "../folio-v${{ steps.version.outputs.new }}.zip" .

      # ── GitHub Release ─────────────────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.new }}
          name: Folio v${{ steps.version.outputs.new }}
          body_path: .github/release-body.md
          files: folio-v${{ steps.version.outputs.new }}.zip

      # ── Deploy to GitHub Pages ─────────────────────────────────────────────
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
